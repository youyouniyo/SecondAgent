<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1280" viewBox="0 0 1440 1280" role="img" aria-labelledby="title desc">
  <title id="title">사용자 호출부터 평가 완료까지의 흐름</title>
  <desc id="desc">Confluence URL 입력부터 Job 생성, 문서 수집, 다중 LLM 평가, Aggregator 판단, 결과 저장, 사용자 반영과 확정까지의 서비스 흐름도</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .lane { fill: #ffffff; stroke: #d7e0ed; stroke-width: 1.5; }
      .lane-title { fill: #344054; font: 700 20px Arial, "Noto Sans KR", sans-serif; }
      .title { fill: #101828; font: 800 34px Arial, "Noto Sans KR", sans-serif; }
      .subtitle { fill: #667085; font: 400 17px Arial, "Noto Sans KR", sans-serif; }
      .node { fill: #ffffff; stroke: #b9c7da; stroke-width: 2; }
      .node-primary { fill: #eaf4ff; stroke: #1677ff; }
      .node-success { fill: #e8f6ef; stroke: #27845f; }
      .node-warn { fill: #fff4d8; stroke: #d08b13; }
      .node-decision { fill: #fffaf0; stroke: #d08b13; }
      .node-text { fill: #172033; font: 700 16px Arial, "Noto Sans KR", sans-serif; }
      .node-small { fill: #475467; font: 400 13px Arial, "Noto Sans KR", sans-serif; }
      .label { fill: #667085; font: 700 13px Arial, "Noto Sans KR", sans-serif; }
      .arrow { stroke: #52657d; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead); }
      .arrow-soft { stroke: #98a7ba; stroke-width: 2; fill: none; marker-end: url(#arrowhead-soft); }
      .badge { fill: #172033; }
      .badge-text { fill: #ffffff; font: 800 13px Arial, "Noto Sans KR", sans-serif; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52657d"/>
    </marker>
    <marker id="arrowhead-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#98a7ba"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="1280"/>
  <text x="72" y="64" class="title">사용자 호출부터 평가까지의 전체 흐름</text>
  <text x="72" y="96" class="subtitle">Confluence 문서 평가 요청이 생성되고, 다중 LLM 평가와 Aggregator 판단을 거쳐 결과 화면에 도달하는 과정</text>

  <rect x="56" y="130" width="1328" height="190" rx="14" class="lane"/>
  <text x="82" y="164" class="lane-title">1. 사용자 요청</text>

  <rect x="92" y="200" width="210" height="78" rx="10" class="node node-primary"/>
  <text x="197" y="232" text-anchor="middle" class="node-text">URL 입력</text>
  <text x="197" y="255" text-anchor="middle" class="node-small">Confluence page URL</text>

  <rect x="382" y="200" width="210" height="78" rx="10" class="node node-primary"/>
  <text x="487" y="232" text-anchor="middle" class="node-text">평가 시작</text>
  <text x="487" y="255" text-anchor="middle" class="node-small">POST /api/evaluations</text>

  <rect x="672" y="200" width="210" height="78" rx="10" class="node"/>
  <text x="777" y="232" text-anchor="middle" class="node-text">Job 생성</text>
  <text x="777" y="255" text-anchor="middle" class="node-small">status: queued</text>

  <rect x="962" y="200" width="250" height="78" rx="10" class="node"/>
  <text x="1087" y="232" text-anchor="middle" class="node-text">백그라운드 실행</text>
  <text x="1087" y="255" text-anchor="middle" class="node-small">run_evaluation_pipeline</text>

  <path class="arrow" d="M 302 239 H 372"/>
  <path class="arrow" d="M 592 239 H 662"/>
  <path class="arrow" d="M 882 239 H 952"/>

  <rect x="56" y="350" width="1328" height="238" rx="14" class="lane"/>
  <text x="82" y="384" class="lane-title">2. 문서 수집 및 평가 준비</text>

  <rect x="92" y="432" width="230" height="82" rx="10" class="node"/>
  <text x="207" y="464" text-anchor="middle" class="node-text">Confluence 조회</text>
  <text x="207" y="488" text-anchor="middle" class="node-small">문서 HTML / 원문 수집</text>

  <rect x="402" y="432" width="230" height="82" rx="10" class="node"/>
  <text x="517" y="464" text-anchor="middle" class="node-text">문서 구조 분석</text>
  <text x="517" y="488" text-anchor="middle" class="node-small">제목, 문단, 목록 정규화</text>

  <rect x="712" y="432" width="230" height="82" rx="10" class="node"/>
  <text x="827" y="464" text-anchor="middle" class="node-text">활성 기준 로드</text>
  <text x="827" y="488" text-anchor="middle" class="node-small">criteria_versions active</text>

  <rect x="1022" y="432" width="250" height="82" rx="10" class="node node-primary"/>
  <text x="1147" y="464" text-anchor="middle" class="node-text">다중 LLM 평가 준비</text>
  <text x="1147" y="488" text-anchor="middle" class="node-small">동일 문서 + 동일 기준</text>

  <path class="arrow" d="M 1087 278 V 338 H 207 V 422"/>
  <path class="arrow" d="M 322 473 H 392"/>
  <path class="arrow" d="M 632 473 H 702"/>
  <path class="arrow" d="M 942 473 H 1012"/>

  <rect x="56" y="618" width="1328" height="300" rx="14" class="lane"/>
  <text x="82" y="652" class="lane-title">3. 평가 및 최종 판단</text>

  <rect x="92" y="706" width="230" height="86" rx="10" class="node node-primary"/>
  <text x="207" y="738" text-anchor="middle" class="node-text">Evaluator LLMs</text>
  <text x="207" y="762" text-anchor="middle" class="node-small">모델별 독립 평가</text>

  <rect x="390" y="706" width="230" height="86" rx="10" class="node"/>
  <text x="505" y="738" text-anchor="middle" class="node-text">모델 결과 저장</text>
  <text x="505" y="762" text-anchor="middle" class="node-small">raw / parsed response</text>

  <polygon points="812,686 942,749 812,812 682,749" class="node-decision"/>
  <text x="812" y="737" text-anchor="middle" class="node-text">점수 차이</text>
  <text x="812" y="760" text-anchor="middle" class="node-small">threshold 이상?</text>

  <rect x="1032" y="650" width="230" height="82" rx="10" class="node node-warn"/>
  <text x="1147" y="682" text-anchor="middle" class="node-text">Aggregator 판단</text>
  <text x="1147" y="706" text-anchor="middle" class="node-small">불일치 항목 재판단</text>

  <rect x="1032" y="782" width="230" height="82" rx="10" class="node"/>
  <text x="1147" y="814" text-anchor="middle" class="node-text">기본 계산</text>
  <text x="1147" y="838" text-anchor="middle" class="node-small">평균 / 중앙값 기반</text>

  <path class="arrow" d="M 1147 514 V 604 H 207 V 696"/>
  <path class="arrow" d="M 322 749 H 380"/>
  <path class="arrow" d="M 620 749 H 672"/>
  <path class="arrow" d="M 942 749 H 990 V 691 H 1022"/>
  <text x="970" y="678" class="label">예</text>
  <path class="arrow" d="M 942 749 H 990 V 823 H 1022"/>
  <text x="970" y="842" class="label">아니오</text>

  <rect x="56" y="948" width="1328" height="174" rx="14" class="lane"/>
  <text x="82" y="982" class="lane-title">4. 결과 저장 및 결과 화면</text>

  <rect x="200" y="1026" width="230" height="74" rx="10" class="node node-success"/>
  <text x="315" y="1055" text-anchor="middle" class="node-text">최종 결과 생성</text>
  <text x="315" y="1078" text-anchor="middle" class="node-small">점수, 등급, 제안</text>

  <rect x="530" y="1026" width="230" height="74" rx="10" class="node node-success"/>
  <text x="645" y="1055" text-anchor="middle" class="node-text">DB 저장</text>
  <text x="645" y="1078" text-anchor="middle" class="node-small">results / scores / suggestions</text>

  <rect x="860" y="1026" width="230" height="74" rx="10" class="node node-success"/>
  <text x="975" y="1055" text-anchor="middle" class="node-text">Job 완료</text>
  <text x="975" y="1078" text-anchor="middle" class="node-small">status: completed</text>

  <rect x="1190" y="1026" width="150" height="74" rx="10" class="node node-primary"/>
  <text x="1265" y="1055" text-anchor="middle" class="node-text">결과 화면</text>
  <text x="1265" y="1078" text-anchor="middle" class="node-small">/result/{id}</text>

  <path class="arrow" d="M 1147 732 V 934 H 315 V 1016"/>
  <path class="arrow" d="M 1147 864 V 934 H 315 V 1016"/>
  <path class="arrow" d="M 430 1063 H 520"/>
  <path class="arrow" d="M 760 1063 H 850"/>
  <path class="arrow" d="M 1090 1063 H 1180"/>

  <rect x="56" y="1152" width="1328" height="92" rx="14" class="lane"/>
  <text x="82" y="1186" class="lane-title">5. 사용자 후속 액션</text>

  <circle cx="314" cy="1208" r="18" class="badge"/>
  <text x="314" y="1213" text-anchor="middle" class="badge-text">1</text>
  <text x="344" y="1214" class="node-text">AI 제안 반영 / 원복</text>

  <circle cx="644" cy="1208" r="18" class="badge"/>
  <text x="644" y="1213" text-anchor="middle" class="badge-text">2</text>
  <text x="674" y="1214" class="node-text">Preview 갱신 및 상태 저장</text>

  <circle cx="984" cy="1208" r="18" class="badge"/>
  <text x="984" y="1213" text-anchor="middle" class="badge-text">3</text>
  <text x="1014" y="1214" class="node-text">본문 Copy 후 결과 확정</text>

  <path class="arrow-soft" d="M 1265 1100 V 1138 H 314 V 1182"/>
</svg>
