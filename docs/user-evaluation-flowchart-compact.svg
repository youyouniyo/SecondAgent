<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="920" viewBox="0 0 1280 920" role="img" aria-labelledby="title desc">
  <title id="title">사용자 호출부터 평가까지의 간단 플로우차트</title>
  <desc id="desc">Confluence URL 입력부터 평가 결과 확정까지의 핵심 흐름을 간단한 플로우차트로 표현한 이미지</desc>
  <defs>
    <style>
      .bg { fill: #f5f8fc; }
      .title { fill: #101828; font: 800 34px Arial, "Noto Sans KR", sans-serif; }
      .subtitle { fill: #667085; font: 400 16px Arial, "Noto Sans KR", sans-serif; }
      .box { fill: #fff; stroke: #c8d3e2; stroke-width: 2; }
      .box-blue { fill: #eaf4ff; stroke: #1677ff; }
      .box-green { fill: #e8f6ef; stroke: #27845f; }
      .box-yellow { fill: #fff4d8; stroke: #d08b13; }
      .diamond { fill: #fffaf0; stroke: #d08b13; stroke-width: 2; }
      .text { fill: #172033; font: 800 17px Arial, "Noto Sans KR", sans-serif; }
      .small { fill: #52657d; font: 400 13px Arial, "Noto Sans KR", sans-serif; }
      .label { fill: #667085; font: 800 13px Arial, "Noto Sans KR", sans-serif; }
      .arrow { stroke: #52657d; stroke-width: 2.6; fill: none; marker-end: url(#arrowhead); }
      .loop { stroke: #98a7ba; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead-soft); stroke-dasharray: 7 6; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52657d"/>
    </marker>
    <marker id="arrowhead-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#98a7ba"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="920"/>
  <text x="64" y="68" class="title">사용자 호출부터 평가까지</text>
  <text x="64" y="100" class="subtitle">핵심 처리만 남긴 간단 플로우차트 버전</text>

  <rect x="86" y="150" width="230" height="82" rx="12" class="box box-blue"/>
  <text x="201" y="183" text-anchor="middle" class="text">1. URL 입력</text>
  <text x="201" y="208" text-anchor="middle" class="small">사용자가 Confluence URL 제출</text>

  <rect x="406" y="150" width="230" height="82" rx="12" class="box box-blue"/>
  <text x="521" y="183" text-anchor="middle" class="text">2. 평가 요청</text>
  <text x="521" y="208" text-anchor="middle" class="small">POST /api/evaluations</text>

  <rect x="726" y="150" width="230" height="82" rx="12" class="box"/>
  <text x="841" y="183" text-anchor="middle" class="text">3. Job 생성</text>
  <text x="841" y="208" text-anchor="middle" class="small">queued 상태로 저장</text>

  <rect x="486" y="300" width="310" height="82" rx="12" class="box"/>
  <text x="641" y="333" text-anchor="middle" class="text">4. 문서 수집 및 분석</text>
  <text x="641" y="358" text-anchor="middle" class="small">Confluence 조회, 구조 정규화</text>

  <rect x="486" y="450" width="310" height="82" rx="12" class="box"/>
  <text x="641" y="483" text-anchor="middle" class="text">5. 활성 평가 기준 로드</text>
  <text x="641" y="508" text-anchor="middle" class="small">버전, 항목, 평가내용, 가중치</text>

  <rect x="486" y="600" width="310" height="82" rx="12" class="box box-blue"/>
  <text x="641" y="633" text-anchor="middle" class="text">6. 다중 LLM 독립 평가</text>
  <text x="641" y="658" text-anchor="middle" class="small">모델별 점수와 수정 제안 생성</text>

  <polygon points="641,735 785,805 641,875 497,805" class="diamond"/>
  <text x="641" y="798" text-anchor="middle" class="text">점수 차이가</text>
  <text x="641" y="823" text-anchor="middle" class="small">threshold 이상?</text>

  <rect x="918" y="764" width="250" height="82" rx="12" class="box box-yellow"/>
  <text x="1043" y="797" text-anchor="middle" class="text">7A. Aggregator 판단</text>
  <text x="1043" y="822" text-anchor="middle" class="small">불일치 항목 재검토</text>

  <rect x="114" y="764" width="250" height="82" rx="12" class="box"/>
  <text x="239" y="797" text-anchor="middle" class="text">7B. 기본 점수 계산</text>
  <text x="239" y="822" text-anchor="middle" class="small">평균 또는 중앙값 사용</text>

  <rect x="876" y="450" width="250" height="82" rx="12" class="box box-green"/>
  <text x="1001" y="483" text-anchor="middle" class="text">8. 결과 저장</text>
  <text x="1001" y="508" text-anchor="middle" class="small">result, scores, suggestions</text>

  <rect x="876" y="300" width="250" height="82" rx="12" class="box box-green"/>
  <text x="1001" y="333" text-anchor="middle" class="text">9. 결과 화면</text>
  <text x="1001" y="358" text-anchor="middle" class="small">요약, 점수, 제안 확인</text>

  <rect x="876" y="150" width="250" height="82" rx="12" class="box box-green"/>
  <text x="1001" y="183" text-anchor="middle" class="text">10. 반영 및 확정</text>
  <text x="1001" y="208" text-anchor="middle" class="small">apply / revert / confirm</text>

  <path class="arrow" d="M 316 191 H 396"/>
  <path class="arrow" d="M 636 191 H 716"/>
  <path class="arrow" d="M 841 232 V 272 H 641 V 290"/>
  <path class="arrow" d="M 641 382 V 440"/>
  <path class="arrow" d="M 641 532 V 590"/>
  <path class="arrow" d="M 641 682 V 725"/>

  <path class="arrow" d="M 785 805 H 908"/>
  <text x="842" y="790" class="label">예</text>
  <path class="arrow" d="M 497 805 H 374"/>
  <text x="424" y="790" class="label">아니오</text>

  <path class="arrow" d="M 1043 764 V 554 H 1001 V 542"/>
  <path class="arrow" d="M 239 764 V 554 H 1001 V 542"/>
  <path class="arrow" d="M 1001 450 V 392"/>
  <path class="arrow" d="M 1001 300 V 242"/>

  <path class="loop" d="M 1126 191 H 1200 V 875 H 822"/>
  <text x="1058" y="890" class="label">수정 제안 재반영 시 상태 갱신</text>
</svg>
