<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>평가중입니다</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="page">
      <div class="app-shell progress-page">
        <section class="progress-shell">
          <div class="progress-intro">
            <div class="spinner"></div>
            <h1>평가중입니다</h1>
            <p>
              Confluence 문서를 읽고 AI-readable 기준으로 분석하고 있습니다.<br />
              여러 LLM이 독립적으로 평가한 뒤, 의견 차이가 큰 항목은 한 번 더 검토합니다.
            </p>
          </div>
          <div class="progress-url">
            <div class="eyebrow">평가 대상 URL</div>
            <div id="progress-url">Confluence URL을 확인하는 중입니다.</div>
          </div>
          <div class="progress-card">
            <div class="summary-head">
              <div>
                <h2 id="progress-step">현재 단계: 평가 준비 중</h2>
                <p class="summary-meta">문서 길이에 따라 약 30초-2분 정도 걸릴 수 있습니다.</p>
              </div>
              <span id="progress-meta" class="pill">0%</span>
            </div>
            <div class="progress-track">
              <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="step-list" class="step-list"></div>
          </div>
        </section>
      </div>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
